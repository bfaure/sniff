name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), retrying in 15s..."
            sleep 15
          done

      - name: Generate Prisma client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Generate schema.sql (used at first launch in packaged app)
        working-directory: apps/backend
        shell: bash
        run: npx prisma migrate diff --from-empty --to-schema-datamodel ./prisma/schema.prisma --script > prisma/schema.sql

      - name: Build shared
        working-directory: packages/shared
        run: npx tsc

      - name: Build backend
        working-directory: apps/backend
        run: npx tsc

      - name: Build renderer
        working-directory: apps/renderer
        run: npx vite build

      - name: Build electron
        working-directory: apps/electron
        run: npx tsc

      - name: Stage electron app dir
        run: node scripts/stage-electron.mjs

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sniff-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
