appId: dev.sniff.app
productName: Sniff
electronVersion: 35.0.1

# Run electron-builder from the repo root so workspace symlinks
# (node_modules/@sniff/backend -> apps/backend) resolve correctly.
directories:
  app: apps/electron
  output: release
  buildResources: apps/electron/build

artifactName: Sniff-${version}-${os}-${arch}.${ext}

# asar disabled on purpose. Electron 35's ESM loader resolves CJS packages via
# Node's legacyMainResolve, which calls into fs APIs that bypass electron's
# asar patching. That breaks `import forge from 'node-forge'` (and any other
# CJS dependency whose `main` points into a subdirectory) with
# `Cannot find package ... Did you mean node-forge/lib/index.js?`.
# Shipping unpacked sidesteps the whole class of issues; our payload is
# already ~500MB so the asar packing savings aren't meaningful.
asar: false

# Files included from the app dir (apps/electron). Defaults pull in
# production dependencies from node_modules automatically; we just trim cruft.
files:
  - dist/**/*
  - package.json
  # Exclusions are intentionally narrow: patterns like `**/HISTORY*` would also
  # match e.g. routes/history.js inside our backend, so we anchor to top-level
  # docs filenames with explicit extensions instead.
  - "!**/node_modules/**/{test,tests,__tests__,docs,doc,examples,example,coverage,benchmark,benchmarks}/**"
  - "!**/node_modules/**/*.{md,markdown,map}"
  - "!**/node_modules/**/*.ts"
  - "!**/node_modules/**/{README,CHANGELOG,CHANGES,LICENSE,LICENCE,NOTICE,AUTHORS,CONTRIBUTING,UPGRADING,GOVERNANCE,CODE_OF_CONDUCT}{,.md,.markdown,.txt,.rst}"
  - "!**/node_modules/**/.bin/**"
  - "!**/node_modules/**/{.eslintrc*,.prettierrc*,.editorconfig,.npmignore,.gitignore}"
  - "!**/node_modules/typescript/**"
  - "!**/node_modules/tsx/**"
  - "!**/node_modules/prisma/**"
  - "!**/node_modules/@types/**"

extraResources:
  - from: apps/renderer/dist
    to: renderer
  # The Prisma generated client (.prisma/client) is generated by `prisma generate`
  # and is not a declared npm dependency, so electron-builder's normal node_modules
  # collector skips it. Copy it into the app's node_modules tree so `require('.prisma/client')`
  # (done from @prisma/client/default.js) resolves via Node's standard lookup.
  - from: apps/electron/node_modules/.prisma
    to: app/node_modules/.prisma

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development

publish: null
